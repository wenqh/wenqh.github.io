<!DOCTYPE html>
<html lang="zh"><head>
    <meta charset="UTF-8">
    <title>📺当前节目</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 1em; }
        .source-links {display: flex; gap: 15px}
        .source-links a {
            padding: 0.4em 0.8em;
            text-decoration: none;
            color: black;
            border-radius: 4px;
            display: inline-block;
        }
        .source-links a.active {
            background-color: black;
            color: white;
        }
        .channel { margin: 10px 0; }
        .channel-name {font-size: 1.0em; display1: inline; width: fit-content; background: black; color: white;}
        .channel-name1 { font-weight: bold; font-size: 1.2em;
            color: white;
            text-shadow:
                    -1px -1px 0 black,
                    1px -1px 0 black,
                    -1px  1px 0 black,
                    1px  1px 0 black;

            1-webkit-text-stroke: 1px black;
        }
        .program {display: flex; gap: 20px; white-space: nowrap; overflow: hidden;}
        .program div{width: 50%; text-overflow: ellipsis; overflow: hidden;}
        .next-program {color: #888; white-space: nowrap; overflow: hidden;}


        #category div {padding: 10px}
    </style>
</head>
<body>
<!-- <h1>正在播放的节目</h1> -->
<div class="source-links" id="source-links">
    <a href="https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/51zmte2.xml" class="active">51zmt</a><!-- http://epg.51zmt.top:8000/e.xml -->
    <a href="https://raw.githubusercontent.com/linitfor/epg/refs/heads/main/merged.xml">台湾</a>
    <a href="https://raw.githubusercontent.com/dujq666/tv/refs/heads/master/output/epg/epg.xml">国内</a>
    <a href="https://raw.githubusercontent.com/1ncred4/iptv/refs/heads/master/output/epg/epg.xml">节点</a>
</div>
<div id="category" style="display: flex;">
    <div data=".*">全部</div>
    <div data="电影|经典|洋片">电影</div>
    <div data="^(?![A-Za-z]+$).+">综合</div>
    <div data="戏剧|偶像|影剧">戏剧</div>
    <div data="卡通|儿童|MOMO亲子台|东森幼幼台|DREAMWORKS|Nickelodeon|NickJr.">儿童</div>
</div>
<div id="content">
</div>

<script>
    const sourceLinks = document.getElementById('source-links');
    const content = document.getElementById('content');

    function loadEPG(url) {
        content.textContent = '加载中...';
        fetch(url)
            .then(response => response.text())
            .then(txt => {
                const doc = new DOMParser().parseFromString(txt, "application/xml");
                const now = new Date(Date.now() + 8 * 3600_000).toISOString().replace(/[-:T.Z]/g, '').slice(0, 14);

                const currentPrograms = [];
                for (const programme of doc.getElementsByTagName('programme')) {
                    const channelId = programme.getAttribute('channel');
                    const start = programme.getAttribute('start');
                    const stop = programme.getAttribute('stop');
                    if (now >= start && now < stop) {
                        const channelName = doc.getElementById(channelId)?.getElementsByTagName('display-name')[0]?.textContent || channelId;
                        const nowProgramme = programme.getElementsByTagName('title')[0]?.textContent || '未知节目';
                        const nextProgramme = programme.nextElementSibling?.getElementsByTagName('title')[0]?.textContent || '未知节目';

                        currentPrograms.push({ channelName, nowProgramme, nextProgramme });
                    }
                }

                content.innerHTML = currentPrograms.map(p =>
                    `<div class="channel">
                        <div class="channel-name">${p.channelName}</div>
                        <div class="program">
                            <div class="program1">${p.nowProgramme}</div>
                            <div class="next-program">${p.nextProgramme}</div>
                        </div>
                    </div>`
                ).join('');
            })
            .catch(err => {
                content.textContent = '加载失败：' + err;
                console.error(err);
            });
    }

    // 点击 a 时加载并高亮
    sourceLinks.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') {
            e.preventDefault();
            for (const a of sourceLinks.querySelectorAll('a')) {
                a.classList.remove('active');
            }
            e.target.classList.add('active');
            loadEPG(e.target.href);
        }
    });
    category.addEventListener('click', (e) => {
        const data = e.target.getAttribute('data');
        if (data) {
            const regex = new RegExp(data);
            Array.from(document.querySelectorAll('.channel')
                .forEach(c => c.style.display = regex.test(c.firstElementChild.textContent) ? '' : 'none'));
        }
    })

    // 初始加载第一个链接
    loadEPG(sourceLinks.querySelector('a').href);
</script>
</body></html>
