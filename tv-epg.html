<!DOCTYPE html>
<html lang="zh"><head>
    <meta charset="UTF-8">
    <title>📺节目表</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif;}
        .source-links {display: flex; gap: 15px}
        .source-links a {
            padding: 0.4em 0.8em;
            text-decoration: none;
            color: black;
            border-radius: 4px;
            display: inline-block;
        }
        .source-links a.active {
            background-color: black;
            color: white;
        }
        #category div {padding: 10px}

        /*.channel { margin: 10px 0; }
        .channel-name {font-size: 1.0em; display1: inline; width: fit-content; background: black; color: white;}
        .channel-name1 { font-weight: bold; font-size: 1.2em;
            color: white;
            text-shadow:
                    -1px -1px 0 black,
                    1px -1px 0 black,
                    -1px  1px 0 black,
                    1px  1px 0 black;

            1-webkit-text-stroke: 1px black;
        }*/


        #content { overflow-x: auto; }                 /* 唯一横向滚动容器,所有频道一起滚 */
        .channel { display: flex;}                     /* 每个频道一行:左名 + 右节目 */
        .channel-name {                                /* 左侧固定列 */
            position: sticky; left: 0; z-index: 1;
            flex: 0 0 120px;
            /*display: flex; align-items: center;*/
            background-color: white;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
            border-right: 1px solid #ddd;
        }
        .programs { display: flex; }                    /* 节目横向排列 */
        .programs > div { flex: 0 0 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .channel-name, .programs > div {padding: 5px 0; border: 1px solid #ddd}
    </style>
</head>
<body>
<!-- <h1>正在播放的节目</h1> -->
<div class="source-links" id="source-links">
    <a href="https://raw.githubusercontent.com/wenqh/tv/refs/heads/main/51zmt-e2.xml" class="active">台湾</a>
    <a href="https://raw.githubusercontent.com/wenqh/tv/refs/heads/main/51zmt-e.xml">国内</a>

    <a href="https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/51zmte2.xml" class="active">台湾</a><!-- http://epg.51zmt.top:8000/e.xml -->
    <a href="https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/51zmt.xml">国内</a>
    <a href="https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml">台湾</a>
    <!--<a href="https://epg.pw/xmltv/epg_TW.xml">台湾</a>-->
    <!--<a href="https://raw.githubusercontent.com/litiande03/epg/refs/heads/master/pl.xml.gz">台湾</a>-->
    <!-- <a href="https://raw.githubusercontent.com/dujq666/tv/refs/heads/master/output/epg/epg.xml">国内</a>-->
</div>
<div id="category" style="display: flex;">
    <div data=".*">全部</div>
    <div data="电影|龙华经典|天映经典|洋片">电影</div>
    <div data="^(?=.*(?:GoodTV|TVB)|.*[^A-Za-z0-9]).+$" data1="^(?![A-Za-z]+$).+">中文</div>
    <div data="戏剧|偶像|影剧">戏剧</div>
    <div data="卡通|儿童|MOMO亲子台|东森幼幼台|DREAMWORKS|Nickelodeon|NickJr.">儿童</div>
</div>
<div id="content"></div>

<script>
    const sourceLinks = document.getElementById('source-links');
    const content = document.getElementById('content');

    function loadEPG(url) {
        content.textContent = '加载中...';
        fetch(url)
            //.then(response => response.text())
            .then(r => url.endsWith('.gz') ? new Response(r.body.pipeThrough(new DecompressionStream('gzip'))).text() : r.text())
            .then(txt => {
                const doc = new DOMParser().parseFromString(txt, "application/xml");
                const now = new Date(Date.now() + 8 * 3600_000).toISOString().replace(/[-:T.Z]/g, '').slice(0, 14);

                let html = '';
                for (const programme of doc.getElementsByTagName('programme')) {
                    const channelId = programme.getAttribute('channel');
                    const start = programme.getAttribute('start');
                    const stop = programme.getAttribute('stop');
                    if (now >= start && now < stop) {
                        const channelName = doc.getElementById(channelId)?.getElementsByTagName('display-name')[0]?.textContent || channelId;
                        const nowProgramme = programme.getElementsByTagName('title')[0]?.textContent || '未知节目';
                        const nextProgramme = programme.nextElementSibling?.getElementsByTagName('title')[0]?.textContent || '未知节目';

                        html += `<div class="channel">
                            <div class="channel-name">${channelName}</div>
                            <div class="programs">
                                <div class="program1">${nowProgramme}</div>
                                <div class="program2">${nextProgramme}</div>
                            </div>
                        </div>`
                    }
                }

                content.innerHTML = html;
            })
            .catch(err => {
                content.textContent = '加载失败：' + err;
                console.error(err);
            });
    }

    // 点击 a 时加载并高亮
    sourceLinks.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') {
            e.preventDefault();
            for (const a of sourceLinks.querySelectorAll('a')) {
                a.classList.remove('active');
            }
            e.target.classList.add('active');
            loadEPG(e.target.href);
        }
    });
    category.addEventListener('click', (e) => {
        const data = e.target.getAttribute('data');
        if (data) {
            const regex = new RegExp(data);
            document.querySelectorAll('.channel').forEach(c => c.style.display = regex.test(c.firstElementChild.textContent) ? '' : 'none');
        }
    })

    // 初始加载第一个链接
    loadEPG(sourceLinks.querySelector('a').href);

    content.addEventListener('click', (e) => {
        if(e.target.closest('.channel-name')) {
            navigator.clipboard.writeText(e.target.innerText);
        }
    })
</script>
</body>
</html>
