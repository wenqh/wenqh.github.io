<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>📺</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {height: 100%; margin: 0}
        ul {list-style-type: none; padding: 0 4px}
        li {padding: 10px 0;}
        li.active {background: black; color: white}

        .container {display: flex; height: 100%}
        .container > * {overflow-y: scroll; overflow-x: hidden;}
        #left {text-align: center; max-width: 24%; white-space: nowrap;}
        #right ul {display: none}
        #right ul.active {display: block}
        #right li {display: flex; align-items: center; gap: 5px}
        #right a {margin: 0 8px; color: inherit}
        #right a:first-of-type {display: none}
        #right img {width: 40px; max-height: 23px; object-fit: contain;}
    </style>
</head>
<body>
<div class="container">
    <ul id="left"><li>全部</li></ul>
    <div id="right" style="flex: 1"></div>
</div>


<div class="menu" tabindex="0" style="position: absolute; top: 0; width: 100%;">
    <style>.menu-body{display: none} .menu:focus-within .menu-body{display: block}
    label {display: block} input, textarea {width: 100%; box-sizing: border-box; font-size: 1.2em}
    #right li {flex-wrap: wrap; white-space: nowrap}/*可以放上面*/
    #right a {color: #888}
    </style>
    <div style="position: fixed; bottom: 20px; right: 10px; width:40px; height:40px; border-radius:50%; border: solid 1px #aaa; background: white; display:flex; justify-content:center; align-items:center;">+</div>
         <!--onclick="menu.style.display=menu.style.display === 'none' ? 'block' : 'none'"-->
    <div class="menu-body" style="background: white; padding: 10px">
        <label>推送URL：</label>
        <input onchange="localStorage.setItem('tvbox-url', value)" id="tvbox-url"> <!--onfocus=-->
        <label>直播源：</label>
        <textarea onchange="load(...value.split('\n').filter(Boolean))" rows="10" id="play-list-url"></textarea>
        <button onclick="localStorage.setItem('play-list-url', previousElementSibling.value)">保存播放列表</button>
        <button onclick="document.querySelectorAll('#right a').forEach((a,i) => {a.textContent = a.href; a.style.display = 'block'})">显示播放地址</button>
    </div>
    <script>
        document.getElementById('tvbox-url').value=localStorage.getItem('tvbox-url') || 'http://192.168.1.2:9978';
        document.getElementById('play-list-url').value=localStorage.getItem('play-list-url');
    </script>
</div>
</body>

<script>
    document.getElementById('left').addEventListener('click', e => {
        if (e.target.tagName === 'LI') {
            const index = ([...e.target.parentNode.children].indexOf(e.target));

            [...document.querySelectorAll('#left li')].forEach((u, i) => u.classList.toggle('active', i === index));

            [...document.querySelectorAll('#right ul')].forEach((u, i) => u.classList.toggle('active', i === index-1 || index === 0));
        }
    });

    let tvBoxUrl = localStorage.getItem('tvbox-url');

    document.getElementById('right').addEventListener('click', e => {
        const li = e.target.closest('li');
        if (!li) return;

        document.querySelector('#right li.active')?.classList.remove('active');
        li.classList.add('active');

        const url = (e.target.closest('a') || li.querySelector('a'))?.href;
        if (!url) return;
        const win = window.open(`${tvBoxUrl}/action?do=push&url=${encodeURIComponent(url)}`, '_blank');
        setTimeout(() => win.close(), 300);
    });

</script>
<script>
    let no = 0;
    load('tv-auto.m3u');
    function load(...urls) {
        urls.reduce((p, url) =>
                p.then(() =>
                    fetch(url)
                        .then(res => {if (!res.ok) throw new Error(`加载失败：${res.status}`);
                            return res.text()})
                        .then(data => {
                            const datas = data.startsWith("#EXTM3U") || data.includes("#EXTINF:") ?
                                parseM3U(data) :
                                parseTXT(data)

                            document.getElementById('left').innerHTML += `${
                                Object.keys(datas).map(d => `<li>${d}</li>`).join('')
                            }`;

                            document.getElementById('right').innerHTML += Object.entries(datas).map(([group, items]) =>
                                `<ul>${Object.entries(items).map(([name, item]) =>
                                    `<li>${String(++no).padStart(3, '0')} <img src="${item.logo}" loading="lazy">${name}${item.urls.map((u, i) => `<a href="${u}" target="_blank">路线${i+1}</a>`).join('')}</li>`
                                ).join('')}</ul>`
                            ).join('');
                        }).catch(err => {
                        alert(err.message);
                        console.error(err);
                    })
                )
            , Promise.resolve());
    }

    //.catch(err => console.error(err));

    function parseM3U(txt) {
        const groups = {}, lines = txt.split(/\r?\n/);
        lines.forEach((line, i) => {
            if (line.startsWith('#EXTINF')) {
                const group = (line.match(/group-title="([^"]*)"/) || ['', '默认'])[1];
                const logo = (line.match(/tvg-logo="([^"]*)"/) || ['', ''])[1];

                const name = line.split(',').pop().trim();
                const url = lines[i + 1];
                //(groups[group] = groups[group] || []).push({ name, url });

                groups[group] ||=  {};
                groups[group][name] ||= { logo: logo, urls: [] };
                groups[group][name].urls.push(url);
            }
        });
        return groups;
    }
    function parseTXT(txt) {
        const groups = {}, lines = txt.split(/\r?\n/);
        let group;
        lines.forEach((line, i) => {
            if (line.endsWith(',#genre#')) {
                group = line.replace(',#genre#', '');
                groups[group] ||= {};
                return;
            }
            const [name, url] = line.split(',');
            if (!url) return;
            groups[group][name] ||= {logo: '', urls: []};
            groups[group][name].urls.push(url);
        });
        return groups;
    }
</script>
</html>
